

services:
  app:
    build: .
    container_name: smc_app
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_HOST=db
      - DB_DATABASE=small_social
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db
      - redis
    networks:
      - smc_network

  db:
    image: mysql:8.0
    container_name: smc_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=small_social
      - MYSQL_ROOT_PASSWORD=secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - smc_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: smc_phpmyadmin
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=secret
    depends_on:
      - db
    networks:
      - smc_network

  redis:
    image: redis:alpine
    container_name: smc_redis
    ports:
      - "6379:6379"
    networks:
      - smc_network

volumes:
  db_data:

networks:
  smc_network:
    driver: bridge
